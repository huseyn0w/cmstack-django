name: CI

on:
  push:
    branches: ["main"]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint (ruff + black + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/dev.txt
      - run: pip install -r requirements/dev.txt
      - name: ruff
        run: ruff check apps config
      - name: black --check
        run: black --check apps config
      - name: mypy (django-stubs)
        run: mypy apps config

  test:
    name: Tests + coverage (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/dev.txt
      - run: pip install -r requirements/dev.txt
      - name: pytest + coverage
        run: |
          pytest -q --cov=apps --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=90
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  test-postgres:
    name: Tests (PostgreSQL — FTS branch)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cmstack_django
          POSTGRES_USER: cmstack_django
          POSTGRES_PASSWORD: cmstack_django
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cmstack_django"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: cmstack_django
      POSTGRES_USER: cmstack_django
      POSTGRES_PASSWORD: cmstack_django
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/dev.txt
      - run: pip install -r requirements/dev.txt
      - name: pytest (PostgreSQL)
        # Exercises the SearchVector/SearchQuery full-text-search branch in
        # apps/search/repositories.py that the SQLite suite cannot reach.
        run: pytest -q --ds=config.settings.test_postgres

  frontend:
    name: Frontend build (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
